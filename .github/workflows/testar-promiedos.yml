name: Testar cruzamento Promiedos (diagnóstico, manual)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  testar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar cruzamento com Promiedos
        run: |
          python cruzar_promiedos.py --dias 20

      - name: Salvar resultado do cruzamento (não é dado de producao, so auditoria)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/cruzamento_promiedos.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sem mudanças para commitar"
          else
            git commit -m "Teste cruzamento Promiedos (com Peru/Paraguai/Uruguai)"
            git pull --rebase origin main || git rebase --abort || true
            git push
          fi
