name: Atualizar Rio de Janeiro (FFERJ) - semanal

on:
  schedule:
    - cron: "0 14 * * 1"  # toda segunda-feira, 1h depois do job do FMF
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar_fferj:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar scraper FFERJ (Rio de Janeiro)
        run: |
          if [ -f scrap_fferj_rio_direto.py ]; then python scrap_fferj_rio_direto.py --max-pg 40 --dias 365 --dias-atras 7; fi

      - name: Salvar arquivos atualizados
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/jogos_programados.csv data/jogos_programados.json data/historico_jogos.csv
          git add data/debug_fferj_rio_pages.json data/debug_fferj_rio_raw.json data/debug_fferj_rio_errors.json 2>/dev/null || true
          git commit -m "Atualiza jogos FFERJ (Rio de Janeiro) - semanal" || echo "Sem mudanças"
          git pull --rebase origin main || git rebase --abort || true
          git push
