name: Testar FGF HTML unificado (diagnóstico, manual)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  testar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Testar scraper FGF HTML (com debug-html)
        run: |
          python scrap_fgf_html.py --once --ano 2026 --incluir-passados --debug-html

      - name: Salvar resultados do diagnóstico (NÃO mistura com dados de produção)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/debug_fgf_html 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sem mudanças para commitar"
          else
            git commit -m "Diagnóstico FGF HTML unificado"
            git pull --rebase origin main || git rebase --abort || true
            git push
          fi
