name: Atualizar jogos Chile Brasil completo

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Rodar scraper Chile principal
        run: |
          python atualizar_jogos_chile.py --once --dias 180 --dias-atras 14

      - name: Adicionar Tercera A/B - En El Camarin
        run: |
          if [ -f adicionar_enelcamarin_tercera.py ]; then python adicionar_enelcamarin_tercera.py --dias 180 --dias-atras 60; fi

      - name: Adicionar CONMEBOL
        run: |
          if [ -f adicionar_conmebol.py ]; then python adicionar_conmebol.py --dias 180 --dias-atras 30; fi

      - name: Adicionar Argentina (AFA)
        run: |
          if [ -f scrap_afa_agenda.py ]; then python scrap_afa_agenda.py --dias 180 --dias-atras 30; fi

      - name: Adicionar Uruguai (AUF)
        run: |
          if [ -f scrap_auf_uruguay.py ]; then python scrap_auf_uruguay.py --dias 180 --dias-atras 30; fi

      - name: Descobrir PDFs atuais da CBF (Playwright + busca, best-effort)
        run: |
          if [ -f atualizar_pdfs_cbf_pagina_v2.py ]; then python atualizar_pdfs_cbf_pagina_v2.py --playwright --buscar-web --somente-listar || echo "Descoberta falhou, seguindo com seeds manuais"; fi

      - name: Adicionar Brasil CBF PDFs FERJ FMF FPF
        run: |
          if [ -f adicionar_brasil_jogos.py ]; then python adicionar_brasil_jogos.py --dias 180 --dias-atras 30; fi

      - name: Adicionar Paulista FPF via API/Playwright
        run: |
          if [ -f scrap_fpf_playwright_api.py ]; then python scrap_fpf_playwright_api.py --dias 180 --dias-atras 30; fi

      - name: Adicionar Copa Paulista
        run: |
          if [ -f scrap_copa_paulista.py ]; then python scrap_copa_paulista.py --dias 180 --dias-atras 30; fi

      - name: Corrigir estádios conhecidos
        run: |
          if [ -f corrigir_json_estadios_errados.py ]; then python corrigir_json_estadios_errados.py; fi

      - name: Limpar jogos passados do JSON atual
        run: |
          if [ -f limpar_jogos_passados_programados.py ]; then python limpar_jogos_passados_programados.py; fi

      - name: Cruzar com Promiedos (auditoria, não altera os dados)
        run: |
          if [ -f cruzar_promiedos.py ]; then python cruzar_promiedos.py --dias 60; fi

      - name: Salvar arquivos atualizados
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/jogos_programados.csv data/jogos_programados.json data/historico_jogos.csv
          git add data/debug_cbf_pdf_discovery.json data/debug_cbf_search.json data/debug_cbf_pdf_links.json 2>/dev/null || true
          git add data/cruzamento_promiedos.json 2>/dev/null || true
          git commit -m "Atualiza jogos Chile Brasil completo" || echo "Sem mudanças"
          git pull --rebase origin main
          git push
