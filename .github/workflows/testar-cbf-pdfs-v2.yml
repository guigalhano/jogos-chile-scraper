name: Testar CBF PDFs v2 (diagnóstico, manual)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  testar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Testar descoberta (requests + Playwright + busca web), somente listar
        run: |
          python atualizar_pdfs_cbf_pagina_v2.py --playwright --buscar-web --somente-listar

      - name: Salvar resultados do diagnóstico
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/debug_cbf_pdf_links.json data/debug_cbf_page_resources.json 2>/dev/null || true
          git commit -m "Diagnóstico CBF PDFs v2 (Playwright)" || echo "Sem mudanças"
          git push
