name: Atualizar jogos Chile

on:
  schedule:
    # Roda todos os dias às 08:00 do Chile quando Chile estiver em UTC-4.
    # Em horário de verão, ajuste se quiser precisão absoluta.
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar scraper
        run: |
          python atualizar_jogos_chile.py --once --dias 60

      - name: Salvar arquivos atualizados
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/jogos_programados.csv data/jogos_programados.json data/historico_jogos.csv
          git commit -m "Atualiza jogos programados" || echo "Sem mudanças"
          git push
