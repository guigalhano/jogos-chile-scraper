name: Atualizar Argentina Federal A - diário

on:
  schedule:
    - cron: "0 12 * * *"  # todo dia, junto com o job diario principal
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar_federal_a:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar scraper Torneo Federal A
        run: |
          if [ -f scrap_afa_federal_a.py ]; then python scrap_afa_federal_a.py --dias 60 --dias-atras 14 --debug-html; fi

      - name: Salvar arquivos atualizados
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          mkdir -p /tmp/dados_novos
          cp data/debug_federal_a_raw.json  /tmp/dados_novos/ 2>/dev/null || true

          for tentativa in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main

            # Copia so os arquivos de debug/raw desta rodada (nao jogos_programados/historico
            # inteiros) e re-mescla contra o estado ATUAL pos-reset. Isso evita sobrescrever
            # com uma copia desatualizada e perder jogos de outras fontes commitados por
            # outro workflow nesse meio-tempo (condicao de corrida).
            cp /tmp/dados_novos/*.json /tmp/dados_novos/*.csv data/ 2>/dev/null || true
            if [ -f data/debug_federal_a_raw.json ]; then
              python merge_apos_reset.py --raw data/debug_federal_a_raw.json
            fi

            git add data/jogos_programados.csv data/jogos_programados.json data/historico_jogos.csv
            git add data/debug_federal_a_raw.json 2>/dev/null || true

            if git diff --cached --quiet; then
              echo "Sem mudanças para commitar"
              break
            fi

            git commit -m "Atualiza jogos Torneo Federal A - diário"

            if git push origin HEAD:main; then
              echo "Push OK na tentativa $tentativa"
              break
            fi

            echo "Push falhou (tentativa $tentativa), tentando de novo..."
            sleep $((RANDOM % 10 + 5))
          done
