name: Testar Liga 1 Peru (diagnóstico, manual)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  testar:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Testar scraper Liga 1 Peru (diagnóstico de rede/HTML)
        run: |
          python scrap_liga1_peru.py --debug-html --wait-ms 15000

      - name: Salvar resultados do diagnóstico (NÃO mistura com dados de produção)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/debug_liga1_responses.json data/debug_liga1_json_payloads.json data/debug_liga1_embedded.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sem mudanças para commitar"
          else
            git commit -m "Diagnóstico Liga 1 Peru"
            git pull --rebase origin main || git rebase --abort || true
            git push
          fi
