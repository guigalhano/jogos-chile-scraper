name: Atualizar estadios/sedes FFERJ (Rio de Janeiro) - mensal

on:
  schedule:
    - cron: "0 3 1 * *"  # todo dia 1 do mes (dados de clube mudam raramente)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar_fferj_estadios:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar scraper de estadios/sedes da FFERJ (com geocodificação)
        run: |
          python scrap_fferj_estadios.py

      - name: Salvar arquivos atualizados
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          mkdir -p /tmp/dados_novos
          cp estadios_ferj_rio.js /tmp/dados_novos/ 2>/dev/null || true
          cp data/debug_fferj_estadios_raw.json data/debug_fferj_geocoding_cache.json /tmp/dados_novos/ 2>/dev/null || true

          for tentativa in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/dados_novos/estadios_ferj_rio.js . 2>/dev/null || true
            cp /tmp/dados_novos/debug_fferj_estadios_raw.json /tmp/dados_novos/debug_fferj_geocoding_cache.json data/ 2>/dev/null || true

            git add estadios_ferj_rio.js
            git add data/debug_fferj_estadios_raw.json data/debug_fferj_geocoding_cache.json 2>/dev/null || true

            if git diff --cached --quiet; then
              echo "Sem mudanças para commitar"
              break
            fi

            git commit -m "Atualiza estadios/sedes FFERJ - mensal"

            if git push origin HEAD:main; then
              echo "Push OK na tentativa $tentativa"
              break
            fi

            echo "Push falhou (tentativa $tentativa), tentando de novo..."
            sleep $((RANDOM % 10 + 5))
          done
