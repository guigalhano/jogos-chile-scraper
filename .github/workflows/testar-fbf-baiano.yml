name: Testar FBF Baiano (diagnóstico, manual)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  testar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Rodar scraper FBF (home + competicoes/1, com debug-html)
        continue-on-error: true
        run: |
          python scrap_fbf_baiano_playwright.py --somente-id home --somente-id 1 --incluir-passados --debug-html 2>&1 | tee data/debug_fbf_run.log

      - name: Salvar resultados do diagnóstico (NÃO mistura com dados de produção)
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/debug_fbf_competicoes_urls.json data/debug_fbf_competicoes_pages.json data/debug_fbf_competicoes_network.json data/debug_fbf_competicoes_raw.json data/debug_fbf_html data/debug_fbf_run.log 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sem mudanças para commitar"
          else
            git commit -m "Diagnóstico FBF Baiano"
            git pull --rebase origin main || git rebase --abort || true
            git push
          fi
