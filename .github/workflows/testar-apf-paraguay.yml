name: Testar APF Paraguai (diagnóstico, manual)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  testar:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Testar scraper APF Paraguai (Copa de Primera + Intermedia)
        run: |
          python scrap_apf_paraguay.py --dias 60 --dias-atras 30

      - name: Salvar resultados do diagnóstico (NÃO mistura com dados de produção)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/debug_apf_pages.json data/debug_apf_jogos_raw.json data/debug_apf_venue_lookup.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sem mudanças para commitar"
          else
            git commit -m "Diagnóstico APF Paraguai"
            git pull --rebase origin main || git rebase --abort || true
            git push
          fi
