name: Testar Peru (ESPN, diagnóstico, manual)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  testar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Testar scraper Peru (ESPN)
        run: |
          python scrap_peru_espn.py --dias 60 --dias-atras 15

      - name: Mostrar resumo
        run: |
          cat data/debug_peru_espn_pages.json
          echo "---"
          python3 -c "
          import json
          rows = json.load(open('data/debug_peru_espn_raw.json', encoding='utf-8'))
          print('total jogos encontrados:', len(rows))
          for r in sorted(rows, key=lambda x: (x['data'], x['hora']))[:20]:
              print(r['data'], r['hora'], '|', r['mandante'], 'x', r['visitante'], '|', r['competicao'])
          "

      - name: Upload artefatos de debug
        uses: actions/upload-artifact@v4
        with:
          name: debug-peru-espn
          path: |
            data/debug_peru_espn_pages.json
            data/debug_peru_espn_raw.json
          retention-days: 7
