name: Testar FGF Gauchão A2 (diagnóstico, manual)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  testar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Testar scraper FGF Gauchão A2
        run: |
          python scrap_fgf_gauchao_a2.py --once --ano 2026 --incluir-passados
