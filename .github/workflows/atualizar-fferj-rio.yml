name: Atualizar Rio de Janeiro (FFERJ) - semanal

on:
  schedule:
    - cron: "0 14 * * 1"  # toda segunda-feira, 1h depois do job do FMF
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar_fferj:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar scraper FFERJ (Rio de Janeiro)
        run: |
          if [ -f scrap_fferj_rio_direto.py ]; then python scrap_fferj_rio_direto.py --max-pg 40 --dias 365 --dias-atras 7; fi

      - name: Salvar arquivos atualizados
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          mkdir -p /tmp/dados_novos
          cp data/debug_fferj_rio_raw.json data/debug_fferj_rio_pages.json data/debug_fferj_rio_errors.json /tmp/dados_novos/ 2>/dev/null || true

          for tentativa in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main

            # Copia so os arquivos de debug/raw desta rodada (nao jogos_programados/historico
            # inteiros) e re-mescla contra o estado ATUAL pos-reset. Isso evita sobrescrever
            # com uma copia desatualizada e perder jogos de outras fontes commitados por
            # outro workflow nesse meio-tempo (condicao de corrida).
            cp /tmp/dados_novos/*.json /tmp/dados_novos/*.csv data/ 2>/dev/null || true
            if [ -f data/debug_fferj_rio_raw.json ]; then
              python merge_apos_reset.py --raw data/debug_fferj_rio_raw.json
            fi

            git add data/jogos_programados.csv data/jogos_programados.json data/historico_jogos.csv
            git add data/debug_fferj_rio_pages.json data/debug_fferj_rio_raw.json data/debug_fferj_rio_errors.json 2>/dev/null || true

            if git diff --cached --quiet; then
              echo "Sem mudanças para commitar"
              break
            fi

            git commit -m "Atualiza jogos FFERJ (Rio de Janeiro) - semanal"

            if git push origin HEAD:main; then
              echo "Push OK na tentativa $tentativa"
              break
            fi

            echo "Push falhou (tentativa $tentativa), tentando de novo..."
            sleep $((RANDOM % 10 + 5))
          done
