name: Atualizar jogos Chile + CONMEBOL

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar scraper Chile
        run: |
          python atualizar_jogos_chile.py --once --dias 180 --dias-atras 14

      - name: Adicionar CONMEBOL
        run: |
          python adicionar_conmebol.py --dias 180 --dias-atras 30

      - name: Salvar arquivos atualizados
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/jogos_programados.csv data/jogos_programados.json data/historico_jogos.csv
          git commit -m "Atualiza jogos Chile e CONMEBOL" || echo "Sem mudanças"
          git push
