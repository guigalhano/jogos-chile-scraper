name: Testar FFERJ Rio (diagnóstico, manual)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  testar:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Testar scraper FFERJ (Rio) com HTML de debug
        run: |
          python scrap_fferj_rio_direto.py --max-pg 5 --dias 180 --debug-html

      - name: Salvar resultados do diagnóstico (NÃO mistura com dados de produção)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/debug_fferj_rio_pages.json data/debug_fferj_rio_raw.json data/debug_fferj_rio_errors.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sem mudanças para commitar"
          else
            git commit -m "Diagnóstico FFERJ Rio de Janeiro"
            git pull --rebase origin main || git rebase --abort || true
            git push
          fi
