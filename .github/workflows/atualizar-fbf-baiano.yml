name: Atualizar Baiano (FBF) - semanal

on:
  schedule:
    - cron: "0 14 * * 1"  # toda segunda-feira
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar_fbf:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Rodar scraper FBF (Baiano) via Playwright
        run: |
          if [ -f scrap_fbf_baiano_playwright.py ]; then python scrap_fbf_baiano_playwright.py --max-id 15 --dias 180 --debug-html; fi

      - name: Salvar arquivos atualizados
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/jogos_programados.csv data/jogos_programados.json data/historico_jogos.csv
          git add data/debug_fbf_competicoes_urls.json data/debug_fbf_competicoes_pages.json data/debug_fbf_competicoes_raw.json data/fbf_mapa_times.json 2>/dev/null || true
          git commit -m "Atualiza jogos FBF (Baiano) - semanal" || echo "Sem mudanças"
          git push
