name: Testar FPF Tabela direto (diagnóstico, manual)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  testar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Testar scraper FPF Tabela.aspx (com interação e ano 2026)
        run: |
          python scrap_fpf_tabela_direto.py --interagir --ano 2026 --debug-html --wait-ms 15000

      - name: Salvar resultados do diagnóstico (NÃO mistura com dados de produção)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/debug_fpf_tabela_requests.json data/debug_fpf_tabela_payloads.json data/debug_fpf_tabela_jogos_raw.json data/debug_fpf_tabela_diag.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sem mudanças para commitar"
          else
            git commit -m "Diagnóstico FPF Tabela direto"
            git pull --rebase origin main || git rebase --abort || true
            git push
          fi
