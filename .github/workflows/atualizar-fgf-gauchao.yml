name: Atualizar FGF Gauchão - diário

on:
  schedule:
    - cron: "30 13 * * *"  # todo dia, meio da manhã no Brasil (RS)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar_fgf_gauchao:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar scraper FGF Gauchão
        run: |
          python scrap_fgf_gauchao.py --once --ano 2026 --dias 365 --dias-atras 30

      - name: Salvar arquivos atualizados
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          mkdir -p /tmp/dados_novos
          cp data/debug_fgf_gauchao_raw.json /tmp/dados_novos/ 2>/dev/null || true

          for tentativa in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main

            # Copia so o raw desta rodada e re-mescla contra o estado ATUAL pos-reset,
            # em vez de sobrescrever jogos_programados inteiro com copia desatualizada
            # (evita perder jogos de outras fontes commitados nesse meio-tempo).
            cp /tmp/dados_novos/*.json data/ 2>/dev/null || true
            if [ -f data/debug_fgf_gauchao_raw.json ]; then
              python merge_apos_reset.py --raw data/debug_fgf_gauchao_raw.json
            fi

            git add data/jogos_programados.csv data/jogos_programados.json data/historico_jogos.csv 2>/dev/null || true

            if git diff --cached --quiet; then
              echo "Sem mudanças para commitar"
              break
            fi

            git commit -m "Atualiza jogos FGF Gauchão - diario"

            if git push origin HEAD:main; then
              echo "Push OK na tentativa $tentativa"
              break
            fi

            echo "Push falhou (tentativa $tentativa), tentando de novo..."
            sleep $((RANDOM % 10 + 5))
          done
