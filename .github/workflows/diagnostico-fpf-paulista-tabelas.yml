name: Diagnóstico FPF Paulista Tabelas (manual)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnostico:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar Tesseract OCR
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-por

      - name: Rodar scraper com --debug-html (sem afetar jogos_programados)
        run: |
          python scrap_fpf_paulista_tabelas.py --once --ano 2026 --dias 365 --dias-atras 30 --debug-html 2>&1 | tee data/debug_fpf_paulista_tabelas/_log_execucao.txt

      - name: Reverter jogos_programados (este workflow é só diagnóstico)
        run: |
          git checkout -- data/jogos_programados.json data/jogos_programados.csv data/historico_jogos.csv 2>/dev/null || true
          rm -f data/debug_fpf_paulista_tabelas_raw.json

      - name: Commitar arquivos de diagnóstico
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/debug_fpf_paulista_tabelas/ -f
          git commit -m "Diagnostico FPF Paulista Tabelas (manual, so texto extraido por PDF)" || echo "Sem mudancas"
          git push origin HEAD:main
